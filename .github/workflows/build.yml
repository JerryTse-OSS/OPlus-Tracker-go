name: Build Go Tools

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: [ '1.23', '1.24' ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build All Binaries
        shell: bash
        run: |
          mkdir -p bin
          COMMANDS="oplus-ota c16_transer changelog_query downgrade_query downgrade_query-v2 iot_query opex_query opex_analyzer realme_edl_query sota_query sota_changelog_query"
          
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXT=".exe"
          fi
          
          for cmd in $COMMANDS; do
            echo "Building $cmd for ${{ matrix.os }}..."
            go build -o "bin/${cmd}-${{ matrix.os }}$EXT" "./cmd/$cmd"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-go${{ matrix.go-version }}
          path: bin/*
